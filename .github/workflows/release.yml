name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: |
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org" \
            | jq -r '.value')

          NPM_TOKEN=$(curl -sS -X POST \
            "https://registry.npmjs.org/-/npm/v1/security/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" \
            | jq -r '.token')

          if [ -z "$NPM_TOKEN" ] || [ "$NPM_TOKEN" = "null" ]; then
            echo "::error::OIDC token exchange failed. Check Trusted Publishing config on npmjs.com"
            exit 1
          fi

          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --provenance --access public
