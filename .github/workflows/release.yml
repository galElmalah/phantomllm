name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server TypeScript
        run: npm run build:server

      - name: Lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/phantomllm-server:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.name }}/phantomllm-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-npm:
    runs-on: ubuntu-latest
    needs: publish-docker
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Publish to npm via Trusted Publishing
        run: |
          # Fetch OIDC token from GitHub
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org" \
            | jq -r '.value')

          # Exchange for npm publish token
          NPM_TOKEN=$(curl -sS -X POST \
            "https://registry.npmjs.org/-/npm/v1/security/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" \
            | jq -r '.token')

          if [ -z "$NPM_TOKEN" ] || [ "$NPM_TOKEN" = "null" ]; then
            echo "::error::Failed to get npm token via OIDC. Check Trusted Publishing config on npm."
            echo "Expected: owner=galElmalah, repo=phantomllm, workflow=release.yml, environment=(empty)"
            exit 1
          fi

          # Publish with the OIDC-issued token
          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --provenance --access public
