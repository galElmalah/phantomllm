name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: |
          # 1. Get GitHub OIDC token
          echo "::group::Requesting OIDC token"
          OIDC_RESPONSE=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to get OIDC token from GitHub"
            echo "Response: $OIDC_RESPONSE"
            exit 1
          fi
          echo "Got OIDC token (${#OIDC_TOKEN} chars)"
          echo "::endgroup::"

          # 2. Exchange for npm token
          echo "::group::Exchanging OIDC token with npm"
          NPM_RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://registry.npmjs.org/-/npm/v1/security/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}")
          HTTP_CODE=$(echo "$NPM_RESPONSE" | tail -1)
          BODY=$(echo "$NPM_RESPONSE" | sed '$d')
          echo "npm OIDC exchange HTTP status: $HTTP_CODE"
          echo "npm OIDC exchange response: $BODY"

          NPM_TOKEN=$(echo "$BODY" | jq -r '.token // empty')

          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::npm OIDC token exchange failed (HTTP $HTTP_CODE)"
            echo "::error::Response: $BODY"
            echo "::error::Verify Trusted Publishing config: owner=galElmalah repo=phantomllm workflow=release.yml environment=(empty)"
            exit 1
          fi
          echo "Got npm token (${#NPM_TOKEN} chars)"
          echo "::endgroup::"

          # 3. Publish
          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --provenance --access public
